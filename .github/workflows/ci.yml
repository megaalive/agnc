name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        shell: pwsh
        run: |
          if (Test-Path .\scripts\build.ps1) {
            .\scripts\build.ps1
            cmake --build out\build\x64-Debug --target test_sse test_shell test_markdown_render test_atomic_write test_tool_path test_provider_registry test_config_provider
            ctest --test-dir out\build\x64-Debug --output-on-failure
            .\out\build\x64-Debug\agnc.exe doctor
            .\out\build\x64-Debug\agnc.exe --version
          } else {
            Write-Error "build.ps1 not found"
          }
